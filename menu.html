<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hari Dosa - Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url(/html/dosa_photo.jpg);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #b22222;
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
        }
        h1 { margin: 0; }

        .cart-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: white;
            color: #b22222;
            border: none;
            padding: 8px 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .menu-section { padding: 20px; }

        .menu-section h2 {
            border-bottom: 2px solid #b22222;
            padding-bottom: 5px;
            color: #b22222;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 8px;
            background-color: #ffffff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .price {
            font-weight: bold;
            color: #333;
        }

        .add-btn {
            margin-left: 10px;
            background-color: #b22222;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-btn:active {
            transform: scale(1.3);
        }

        .cart-panel {
            position: fixed;
            right: -350px;  
            top: 0;
            width: 320px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            padding: 20px;
            transition: 0.3s;
            overflow-y: auto;
        }

        .cart-panel.active {
            right: 5px;  
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #b22222;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
        }

        .cart-item button.remove-btn {
            background: none;
            border: none;
            color: red;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            font-size: 16px;
        }

        .total {
            font-weight: bold;
            margin-top: 15px;
            font-size: 18px;
        }

        .order-btn {
            background-color: #b22222;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            background-color: #b22222;
            color: white;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Hari Dosa</h1>
    <p>Authentic South Indian Cuisine</p>
    <button class="cart-btn" onclick="toggleCart()">Cart 🛒</button>
</header>

<div class="cart-panel" id="cartPanel">
    <button class="close-btn" onclick="toggleCart()">✖</button>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="total">Total: ₹<span id="totalAmount">0</span></div>
    <a href="scanner.html" >
    <button class="order-btn">Place Order</button>
    </a>
</div>

<div class="menu-section">
    <h2>Dosa Varieties</h2>

    <div class="menu-item">
        <span>Plain Dosa</span>
        <span>
            <span class="price">₹30</span>
            <button class="add-btn" onclick="addToCart('Plain Dosa',30)">+</button>
        </span>
    </div>

    <div class="menu-item">
        <span>Masala Dosa</span>
        <span>
            <span class="price">₹40</span>
            <button class="add-btn" onclick="addToCart('Masala Dosa',40)">+</button>
        </span>
    </div>

    <div class="menu-item">
        <span>Cheese Dosa</span>
        <span>
            <span class="price">₹45</span>
            <button class="add-btn" onclick="addToCart('Cheese Dosa',45)">+</button>
        </span>
    </div>

    <div class="menu-item">
        <span>Paneer Dosa</span>
        <span>
            <span class="price">₹60</span>
            <button class="add-btn" onclick="addToCart('Paneer Dosa',60)">+</button>
        </span>
    </div>
</div>

<div class="menu-section">
    <h2>Idli & Vada</h2>

    <div class="menu-item">
        <span>Idli (2 pcs)</span>
        <span>
            <span class="price">₹30</span>
            <button class="add-btn" onclick="addToCart('Idli (2 pcs)',30)">+</button>
        </span>
    </div>

    <div class="menu-item">
        <span>Medu Vada</span>
        <span>
            <span class="price">₹30</span>
            <button class="add-btn" onclick="addToCart('Medu Vada',30)">+</button>
        </span>
    </div>
</div>

<div class="menu-section">
    <h2>Beverages</h2>

    <div class="menu-item">
        <span>Filter Coffee</span>
        <span>
            <span class="price">₹20</span>
            <button class="add-btn" onclick="addToCart('Filter Coffee',20)">+</button>
        </span>
    </div>

    <div class="menu-item">
        <span>Masala Chai</span>
        <span>
            <span class="price">₹20</span>
            <button class="add-btn" onclick="addToCart('Masala Chai',20)">+</button>
        </span>
    </div>
</div>

<footer>
    © 2026 Hari Dosa | All Rights Reserved
</footer>

<script>
    let cart = {};

    function toggleCart() {
        document.getElementById("cartPanel").classList.toggle("active");
    }

    function addToCart(name, price) {
        if (cart[name]) {
            cart[name].quantity += 1;
        } else {
            cart[name] = { price: price, quantity: 1 };
        }
        updateCart();
    }

    function removeFromCart(name) {
        delete cart[name];
        updateCart();
    }

    function updateCart() {
        const cartItemsDiv = document.getElementById("cartItems");
        cartItemsDiv.innerHTML = "";

        let total = 0;

        for (let item in cart) {
            let itemTotal = cart[item].price * cart[item].quantity;
            total += itemTotal;

            let div = document.createElement("div");
            div.classList.add("cart-item");
            div.innerHTML = `
                <span>${item} x ${cart[item].quantity}</span>
                <span>₹${itemTotal} <button class="remove-btn" onclick="removeFromCart('${item}')">×</button></span>
            `;
            cartItemsDiv.appendChild(div);
        }

        document.getElementById("totalAmount").textContent = total;
    }
</script>

</body>
</html>
