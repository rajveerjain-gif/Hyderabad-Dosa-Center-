<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYD Tiffin Center Explorer</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
        overflow: hidden;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .glass-container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        text-align: center;
        transition: 0.4s ease;
    }

    .glass-container:hover {
        transform: translateY(-10px);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    h1 {
        color: white;
        margin-bottom: 25px;
        font-size: 32px;
        letter-spacing: 1px;
    }

    img {
        width: 350px;
        border-radius: 15px;
        transition: 0.4s ease;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    img:hover {
        transform: scale(1.08);
        box-shadow: 0 15px 40px rgba(255,255,255,0.6);
    }
</style>

</head>

<body>

<div class="glass-container">
    <h1>HYD Tiffin Center Explorer</h1>
    <a href="orderconfirm.html" >
    <img src="/html/scanner_photo.jpg" alt="Scanner Image">
    </a>
</div>

<script>
    // Select the image inside the glass container
    const img = document.querySelector('.glass-container img');

    // Add a click event listener
    img.addEventListener('click', () => {
        console.log('Image clicked! Redirecting...');
        // Add a temporary scale effect for feedback
        img.style.transform = 'scale(1.1)';
        setTimeout(() => {
            img.style.transform = 'scale(1.08)'; // return to hover scale
        }, 200);
    });
</script>

</body>
</html>
