<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYD Tiffin Center Explorer</title>

<style>

body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-image: url(html/dosa_photo.jpg);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    text-align: center;
    animation: fadeIn 1.5s ease-in-out;
}


.heading-box {
    border: 4px solid white;
    padding: 25px;
    border-radius: 15px;
    background-color: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    margin-bottom: 40px;
    animation: slideDown 1.5s ease-in-out;
}

.heading-box h1 {
    color: white;
    font-size: 32px;
    letter-spacing: 2px;
    display: inline-block;
    overflow: hidden;
    border-right: 3px solid white;
    white-space: nowrap;
    animation: typing 3s steps(35), blink 0.7s infinite;
}

.login-box {
    width: 300px;
    padding: 30px;
    border-radius: 15px;
    border: 3px solid white;
    background-color: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    animation: slideUp 1.5s ease-in-out;
}

.login-box h2 {
    color: white;
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

.login-box button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background-color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-box button:hover {
    background-color: #333;
    color: white;
}


@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideDown {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes typing {
    from { width: 0; }
    to { width: 100%; }
}

@keyframes blink {
    50% { border-color: transparent; }
}

</style>
</head>

<body>

<div class="container">

    <div class="heading-box">
        <h1>WELCOME TO HYD TIFFIN CENTER EXPLORER</h1>
    </div>
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <a href="index.html">
        <button id="loginBtn">Login</button>
        </a>
    </div>
</div>

<script>
const username=document.getElementById("username");
const password=document.getElementById("password");
const loginBtn=document.getElementById("loginBtn");

loginBtn.addEventListener("click",function(e){
if(username.value.trim()===""||password.value.trim()===""){
e.preventDefault();
alert("Please enter username and password");
}
});
</script>

</body>
</html>
